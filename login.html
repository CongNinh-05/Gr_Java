<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmokeFree</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth-style.css">
  <link rel="stylesheet" href="plugins/themify-icons/themify-icons.css">
</head>

<body>
  <div id="container">
    <!-- Sidebar -->
    <aside id="sidebar"> 
      <div id="sidebar-header">
        <a href="index.html">
              <img id="sidebar-logo" src="images/logo.png" alt="SmokeFree">
            </a>
      </div>      
    </aside>

    <!-- Content -->
    <div id="auth-container">
      <h2 id="auth-title">ĐĂNG NHẬP</h2>
      
      <form id="auth-form">
          <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" required>
          </div>
          
          <div class="form-group">
              <label for="password">Mật khẩu</label>
              <input type="password" id="password" required>
          </div>
          
          
          <button type="submit" class="auth-btn btn-primary">Đăng nhập</button>

          
          <div id="auth-links">
              <a class="auth-link" href="./register.html">Đăng ký tài khoản</a>
          </div>
      </form>
    </div>
  </div>

  <script src="plugins/jQuery/jquery.min.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
