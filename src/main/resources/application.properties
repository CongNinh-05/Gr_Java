spring.application.name=SmokeFree
 # ======= MySQL DB Connection =======
spring.datasource.url=jdbc:mysql://localhost:3306/smokefree_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ======= JPA / Hibernate =======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ======= Server =======
server.port=8080

# ======= JWT Configuration =======
jwt.secret=your-256-bit-secret-key-here-must-be-at-least-32-characters-long
jwt.expiration=86400 # 24 hours in seconds

# ======= Swagger UI =======
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true