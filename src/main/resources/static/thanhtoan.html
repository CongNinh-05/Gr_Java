<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>
        QR Payment
    </title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-white flex justify-center items-center min-h-screen p-4">
<div class="max-w-xs w-full text-center">
    <p class="text-base text-gray-900 mb-4">
        Quét mã QR dưới đây bằng ứng dụng Internet Banking để thanh toán
    </p>
    <img alt="Black and white QR code for Internet Banking payment" class="mx-auto mb-4" height="200" src="https://storage.googleapis.com/a1aa/image/c35353b6-5001-439f-4d9b-cf9ee7366ecb.jpg" width="200"/>
    <p class="text-xs text-gray-400 mb-1">
        Lưu ý: Mã QR này sẽ hết hạn sau 24 giờ kể từ lúc tạo
    </p>
    <p class="text-xs text-gray-400 mb-1">
        Số hoá đơn: 17780894300907867301
    </p>
    <p class="text-xs text-gray-400 mb-6">
        Sau khi thanh toán, nhấp vào nút bên dưới
    </p>
    <button aria-label="Quay lại trang chủ" class="text-gray-700 hover:text-gray-900 transition" onclick="window.location.href='home'">
        Tôi đã hoàn tất thanh toán trên App
    </button>

</div>
</body>
</html>
