<body>
  <div class="container mt-5">
    <div class="card">
      <div class="card-header bg-success text-white">
        💬 Trò chuyện
      </div>

      <div class="chat-box" id="chatBox"></div>

      <div class="card-footer bg-light">
        <form id="chatForm" class="d-flex">
          <input
            type="text"
            class="form-control me-2"
            id="messageInput"
            placeholder="Nhập tin nhắn..."
            required
          />
          <button class="btn btn-success" type="submit">Gửi</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
  const chatBox = document.getElementById("chatBox");
  const chatForm = document.getElementById("chatForm");
  const messageInput = document.getElementById("messageInput");

  function addMessage(text, sender = "bot") {
    const message = document.createElement("div");
    message.classList.add("chat-message", sender === "user" ? "user-message" : "bot-message");
    message.textContent = text;
    chatBox.appendChild(message);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  // Tin nhắn tự động đầu tiên
  addMessage("Cảm ơn bạn đã lựa chọn trang web của chúng tôi, hãy cho chúng tôi biết vấn đề của bạn!", "bot");

  // Gửi tin nhắn
  chatForm.addEventListener("submit", function (e) {
    e.preventDefault();
    const userMessage = messageInput.value.trim();
    if (userMessage !== "") {
      addMessage(userMessage, "user");
      messageInput.value = "";

      // Trả lời tự động sau 1.5 giây
      setTimeout(() => {
        addMessage("Chúng tôi sẽ trả lời ngay, vui lòng đợi giây lát!", "bot");
      }, 1500);
    }
  });
});

  </script>
  <script src="js/script.js"></script>

</body>
